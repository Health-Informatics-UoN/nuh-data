id: https://health-informatics-uon.github.io/nuh-data/datasets/cosd
name: cosd
title: NUH Cancer Outcomes and Services Dataset (COSD)
description: >-
  Clinical dataset documenting cancer outcomes and services for patients
  diagnosed and treated at Nottingham University Hospitals NHS Trust.
  Covers the full cancer pathway from referral through diagnosis, staging,
  treatment, and follow-up, including both primary and non-primary
  (recurrence/relapse) pathways.

license: https://opensource.org/license/mit

created_by: https://github.com/Health-Informatics-UoN

annotations:
  data_custodian: Nottingham University Hospitals NHS Trust
  created_by_name: Nottingham University Hospitals NHS Trust
  geographic_coverage: Nottinghamshire, England
  data_standards: COSD, OTHER
  access_request_type: Data Access Request
  access_status: In Progress

keywords:
  - cancer outcomes
  - COSD
  - oncology
  - NHS
  - Nottingham
  - cancer pathway
  - clinical

prefixes:
  linkml: https://w3id.org/linkml/
  cosd: https://health-informatics-uon.github.io/nuh-data/datasets/cosd/
  SNOMED: http://snomed.info/id/
  ICD: http://id.who.int/icd/entity/
  OPCS: https://datadictionary.nhs.uk/attributes/opcs_code/
  NICIP: https://www.datadictionary.nhs.uk/nhs_business_definitions/nicip_code/

default_prefix: cosd
default_range: string

imports:
  - linkml:types

classes:
  COSDResearchView:
    description: >-
      Flat research view combining file metadata, patient demographics,
      primary pathway, non-primary pathway, diagnostic procedures, staging,
      treatment, and outcomes data. Corresponds to RVW.COSD_RESEARCH_VIEW
      in the source database. Each row represents one COSD record.

      "04":
        description: "Not Offered"
      "05":
        description: "Offered but Patient Unable to Complete"

  BasisOfDiagnosisCancer:
    description: "This is the method used to confirm the cancer."
    permissible_values:
      "0":
        description: "Death certificate only (DCO): Information provided is from a death certificate"
      "1":
        description: "Clinical: Diagnosis made before death, but without any of the following codes"
      "2":
        description: "Clinical Investigation: All diagnostic techniques, including X-ray, endoscopy, imaging, ultrasound, exploratory surgery (such as laparotomy), and autopsy, without a tissue diagnosis"
      "4":
        description: "Specific tumour markers: Includes biochemical and/or immunological markers which are specific for a tumour site"
      "5":
        description: "Cytology: Examination of cells from a primary or secondary site, including fluids aspirated by endoscopy or needle; also includes the microscopic examination of peripheral blood and bone marrow aspirates, immunophenotyping by flow cytometry and a liquid biopsy in the absence of pathology"
      "6":
        description: "Histology of a metastasis"
      "7":
        description: "Histology of a primary tumour"
      "7.1":
        description: "Histology of the primary tumour: Histologic examination of tissue from the primary tumour, however obtained, including all cutting techniques and bone marrow biopsies"
      "7.2":
        description: "Histology of a metastasis: No histology of the primary tumour"
      "7.3":
        description: "Histology at autopsy: No histology before autopsy"
      "8":
        description: "Cytogenetic and/or molecular testing: Detection of tumour-specific genetic abnormalities or genetic changes in the tumour, including techniques such as karyotyping, FISH (fluorescent in situ hybridization), PCR (polymerase chain reaction), DNA sequencing"
      "9":
        description: "Unknown: No information on how the diagnosis has been made (e.g. PAS or HISS record only)"

  CancerCarePlanIntent:
    description: "The intention of a Cancer Care Plan developed within a Cancer Care Spell."
    permissible_values:
      C:
        description: "Curative"
      Z:
        description: "Non Curative"
      X:
        description: "No active treatment"
      "9":

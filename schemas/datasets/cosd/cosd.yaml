slots:
  # ---------------------------------------------------------------------------
  # ETL / provenance
  # ---------------------------------------------------------------------------

  etl_id:
    description: "Internal identifier for the ETL batch run that loaded this record."
    range: integer
    required: false
    annotations:
      sql_column: ETL_ID
      sql_type: "INT"

  etl_date:
    description: "Date and time the ETL process ran."
    range: datetime
    required: false
    annotations:
      sql_column: ETL_DATE
      sql_type: "DATETIME"

  direct_care_published_runid:
    description: "Run identifier from the DirectCare publishing pipeline."
    range: integer
    required: false
    annotations:
      sql_column: DIRECT_CARE_PUBLISHED_RUNID
      sql_type: "INT"

  dataset_name:
    description: "Name of the source dataset."
    range: string
    required: false
    annotations:
      sql_column: DATASET_NAME
      sql_type: "NVARCHAR(300)"

  ndo_run_date:
    description: "Date the National Data Opt-out (NDO) filter was applied to this record."
    range: date
    required: false
    annotations:
      sql_column: NDO_RUN_DATE
      sql_type: "DATE"

  file_name:
    description: "Name of the source COSD submission file."
    range: string
    required: false
    annotations:
      sql_column: FILE_NAME
      sql_type: "NVARCHAR(1000)"

  # ---------------------------------------------------------------------------
  # File / submission metadata
  # ---------------------------------------------------------------------------

  c000010_id:
    description: "Unique identifier (UUID) for the COSD submission file."
    range: string
    required: false
    annotations:
      sql_column: C000010_ID
      sql_type: "VARCHAR(36)"

  c000020_id_submitting_org:
    description: "Organisation identifier of the organisation submitting the COSD file."
    range: string
    required: false
    annotations:
      sql_column: C000020_ID_SUBMITTING_ORG
      sql_type: "VARCHAR(6)"

  c000030_record_count:
    description: "Total number of records contained in the submission file."
    range: string
    required: false
    annotations:
      sql_column: C000030_RECORD_COUNT
      sql_type: "VARCHAR(7)"

  c000040_reporting_period_start_date:
    description: "Start date of the reporting period covered by this submission."
    range: date
    required: false
    annotations:
      sql_column: C000040_REPORTING_PERIOD_START_DATE
      sql_type: "DATE"

  c000050_reporting_period_end_date:
    description: "End date of the reporting period covered by this submission."
    range: date
    required: false
    annotations:
      sql_column: C000050_REPORTING_PERIOD_END_DATE
      sql_type: "DATE"

  c000060_file_creation_datetime:
    description: "Date and time the submission file was created."
    range: string
    required: false
    annotations:
      sql_column: C000060_FILE_CREATION_DATETIME
      sql_type: "VARCHAR(19)"

  # ---------------------------------------------------------------------------
  # Record type
  # ---------------------------------------------------------------------------

  record_type:
    description: "Indicates whether the record relates to a primary or non-primary cancer pathway."
    range: string
    required: false
    annotations:
      sql_column: RECORD_TYPE
      sql_type: "NVARCHAR(100)"

  # ---------------------------------------------------------------------------
  # Patient identifiers
  # ---------------------------------------------------------------------------

  pseudo_c000070_unique_record_id:
    description: "The universal unique identifier (UUID) for the record"
    range: string
    required: false
    annotations:
      sql_column: PSEUDO_C000070_UNIQUE_RECORD_ID
      sql_type: "VARBINARY(100)"
      sensitivity: pseudonymised

  pseudo_cr0010_nhs_number:
    description: "The NHS NUMBER, the primary identifier of a PERSON, is a unique identifier for a PATIENT within the NHS in England and Wales. This will not vary by any ORGANISATION of which a PERSON is a PATIENT."
    range: string
    required: false
    annotations:
      sql_column: PSEUDO_CR0010_NHS_NUMBER
      sql_type: "VARBINARY(100)"
      sensitivity: pseudonymised

  # ---------------------------------------------------------------------------
  # Patient demographics
  # ---------------------------------------------------------------------------

  cr1350_nhs_num_stat_code:
    description: "The NHS NUMBER STATUS INDICATOR CODE is the trace status of the NHS NUMBER"
    range: NhsNumberStatusIndicatorCode
    required: false
    annotations:
      sql_column: CR1350_NHS_NUM_STAT_CODE
      sql_type: "VARCHAR(2)"

  date_of_birth_year:
    description: "Year component of the patient's date of birth."
    range: string
    required: false
    annotations:
      sql_column: DATE_OF_BIRTH_YEAR
      sql_type: "VARCHAR(4)"

  date_of_birth_month:
    description: "Month component of the patient's date of birth."
    range: string
    required: false
    annotations:
      sql_column: DATE_OF_BIRTH_MONTH
      sql_type: "VARCHAR(2)"

  date_of_birth_mid_month:
    description: "Mid-month proxy date of birth, derived as the 15th of the patient's birth month."
    range: date
    required: false
    annotations:
      sql_column: DATE_OF_BIRTH_MID_MONTH
      sql_type: "DATE"

  cr0030_provider_id:
    description: >-
      The ORGANISATION IDENTIFIER of the Organisation acting as a Health Care Provider.
      (an6 not applicable to COSD)
    range: string
    required: false
    annotations:
      sql_column: CR0030_PROVIDER_ID
      sql_type: "VARCHAR(5)"

  pp_cr0370_diag_primary_diag_icd:
    description: "The International Classification of Diseases (ICD) code used to identify the PRIMARY DIAGNOSIS"
    range: string
    required: false
    annotations:
      sql_column: PP_CR0370_DIAG_PRIMARY_DIAG_ICD
      sql_type: "VARCHAR(6)"

  pp_cr0380_diag_tumour_laterality:
    description: "Tumour laterality identifies the side of the body for a tumour relating to paired organs within a PATIENT."
    range: TumourLaterality
    required: false
    annotations:
      sql_column: PP_CR0380_DIAG_TUMOUR_LATERALITY
      sql_type: "VARCHAR(1)"

  pp_cr2030_diag_date_of_primary_diag_clin_agreed:
    description: "Record the date where the primary cancer was confirmed or diagnosis agreed."
    range: date
    required: false
    annotations:
      sql_column: PP_CR2030_DIAG_DATE_OF_PRIMARY_DIAG_CLIN_AGREED
      sql_type: "DATE"

  npp_cr6500_date_diagnosis_clinically_agreed:
    description: "Record the date where the non primary cancer diagnosis was confirmed or agreed."
    range: date
    required: false
    annotations:
      sql_column: NPP_CR6500_DATE_DIAGNOSIS_CLINICALLY_AGREED
      sql_type: "DATE"

  npp_cr7100_diag_original_primary_diagnosis_icd:
    description: >-
      Record the ICD10 code of the original primary diagnosis.
      This will normally be agreed at the MDT by the clinical team.
    range: string
    required: false
    annotations:
      sql_column: NPP_CR7100_DIAG_ORIGINAL_PRIMARY_DIAGNOSIS_ICD
      sql_type: "VARCHAR(6)"

  npp_cr6520_rec1_metastatic_type1:
    description: "Indicate the type of metastatic disease diagnosed by the clinical team"
    range: MetastaticType
    required: false
    annotations:
      sql_column: NPP_CR6520_REC1_METASTATIC_TYPE1
      sql_type: "VARCHAR(2)"

  npp_cr1590_rec1_metastatic_site1:
    description: >-
      The site of the metastatic disease, if any
      
      More than one site can be recorded
    range: MetastaticSite
    required: false
    annotations:
      sql_column: NPP_CR1590_REC1_METASTATIC_SITE1
      sql_type: "VARCHAR(2)"

  # ---------------------------------------------------------------------------
  # Primary pathway — diagnosis
  # ---------------------------------------------------------------------------

  npp_cr6520_rec1_metastatic_type2:
    description: "Indicate the type of metastatic disease diagnosed by the clinical team"
    range: MetastaticType
    required: false
    annotations:
      sql_column: NPP_CR6520_REC1_METASTATIC_TYPE2
      sql_type: "VARCHAR(2)"

  npp_cr1590_rec1_metastatic_site2:
    description: >-
      The site of the metastatic disease, if any
      
      More than one site can be recorded
    range: MetastaticSite
    required: false
    annotations:
      sql_column: NPP_CR1590_REC1_METASTATIC_SITE2
      sql_type: "VARCHAR(2)"

  npp_cr1550_diag_palliative_care_specialist_seen_indicator_cancer_recurrence:
    description: "Record whether the patient was seen by a palliative care specialist. This would be a member of the specialist palliative care team led by a consultant in palliative medicine for a recurrence of cancer."
    range: PalliativeCareSpecialistSeenIndicatorCancerRecurrence
    required: false
    annotations:
      sql_column: NPP_CR1550_DIAG_PALLIATIVE_CARE_SPECIALIST_SEEN_INDICATOR_CANCER_RECURRENCE
      sql_type: "VARCHAR(1)"

  # ---------------------------------------------------------------------------
  # Non-primary pathway — diagnosis (recurrence / relapse)
  # ---------------------------------------------------------------------------

  npp_cr9000_diag_relapse_method_of_detection_1:
    description: "Indicate the method of detection for the patients relapse"
    range: RelapseMethodOfDetection
    required: false
    annotations:
      sql_column: NPP_CR9000_DIAG_RELAPSE_METHOD_OF_DETECTION_1
      sql_type: "VARCHAR(1)"

  npp_cr9000_diag_relapse_method_of_detection_2:
    description: "Indicate the method of detection for the patients relapse"
    range: RelapseMethodOfDetection
    required: false
    annotations:
      sql_column: NPP_CR9000_DIAG_RELAPSE_METHOD_OF_DETECTION_2
      sql_type: "VARCHAR(1)"

  npp_cr6900_progression_icd:
    description: >-
      Where a cancer has progressed, record the ICD10 code of the original diagnosis.
      This will normally be agreed at the MDT by the clinical team.
    range: string
    required: false
    annotations:
      sql_column: NPP_CR6900_PROGRESSION_ICD
      sql_type: "VARCHAR(6)"

  npp_cr6520_prog_metastatic_type_progression1:
    description: "Indicate the type of metastatic disease diagnosed by the clinical team"
    range: MetastaticType
    required: false
    annotations:
      sql_column: NPP_CR6520_PROG_METASTATIC_TYPE_PROGRESSION1
      sql_type: "VARCHAR(2)"

  npp_cr1590_prog_metastatic_site_progression1:
    description: >-
      The site of the metastatic disease, if any
      
      More than one site can be recorded
    range: MetastaticSite
    required: false
    annotations:
      sql_column: NPP_CR1590_PROG_METASTATIC_SITE_PROGRESSION1
      sql_type: "VARCHAR(2)"

  npp_cr6520_prog_metastatic_type_progression2:
    description: "Indicate the type of metastatic disease diagnosed by the clinical team"
    range: MetastaticType
    required: false
    annotations:
      sql_column: NPP_CR6520_PROG_METASTATIC_TYPE_PROGRESSION2
      sql_type: "VARCHAR(2)"

  npp_cr1590_prog_metastatic_site_progression2:
    description: >-
      The site of the metastatic disease, if any
      
      More than one site can be recorded
    range: MetastaticSite
    required: false
    annotations:
      sql_column: NPP_CR1590_PROG_METASTATIC_SITE_PROGRESSION2
      sql_type: "VARCHAR(2)"

  npp_cr7200_trans_original_morphologyicd_o_3:
    description: >-
      Record the morphology ICD-O-3 code of the original diagnosis.
      This will normally be agreed at the MDT by the clinical team.
    range: string
    required: false
    annotations:
      sql_column: NPP_CR7200_TRANS_ORIGINAL_MORPHOLOGYICD_O_3
      sql_type: "VARCHAR(7)"

  npp_cr7210_trans_original_morphology_snomed:
    description: >-
      Record the SNOMED morphology code of the original diagnosis.
      This will normally be agreed at the MDT by the clinical team.
    range: string
    required: false
    annotations:
      sql_column: NPP_CR7210_TRANS_ORIGINAL_MORPHOLOGY_SNOMED
      sql_type: "VARCHAR(18)"

  npp_cr7010_trans_morphology_icd_o_3_trans:
    description: "The morphology code for the transformation of the cancer as defined by ICD-O-3. This can be recorded as well as or instead of MORPHOLOGY (SNOMED) TRANSFORMATION."
    range: string
    required: false
    annotations:
      sql_column: NPP_CR7010_TRANS_MORPHOLOGY_ICD_O_3_TRANS
      sql_type: "VARCHAR(7)"

  npp_cr7000_trans_morphology_snomed_trans:
    description: "This is the TRANSFORMATION DIAGNOSIS using the SNOMED International / SNOMED CT code for the cell type of the tumour recorded as part of a Cancer Care Spell. This can be recorded as well as or instead of MORPHOLOGY (ICD-O-3) TRANSFORMATION."
    range: string
    required: false
    annotations:
      sql_column: NPP_CR7000_TRANS_MORPHOLOGY_SNOMED_TRANS
      sql_type: "VARCHAR(20)"

  npp_cr7030_trans_snomed_version_current_trans:
    description: "The version of SNOMED used to encode MORPHOLOGY (SNOMED) TRANSFORMATION"
    range: SnomedVersionTransformation
    required: false
    annotations:
      sql_column: NPP_CR7030_TRANS_SNOMED_VERSION_CURRENT_TRANS
      sql_type: "VARCHAR(20)"

  llsoa:
    description: "Lower Layer Super Output Area code, used as a geographic indicator for deprivation and service planning."
    range: string
    required: false
    annotations:
      sql_column: LLSOA
      sql_type: "VARCHAR(9)"

  cr3170_person_stated_gender_code:
    description: "Person's gender as self-declared (or inferred by observation for those unable to declare their PERSON STATED GENDER)."
    range: PersonStatedGenderCode
    required: false
    annotations:
      sql_column: CR3170_PERSON_STATED_GENDER_CODE
      sql_type: "VARCHAR(1)"

  cr6840_person_sexual_orientation_code_at_diagnosis:
    description: >-
      Person's sexual orientation as self-declared at the time of the PATIENT DIAGNOSIS.
      
      This complies with the information standard DCB2094.
    range: PersonSexualOrientationCodeAtDiagnosis
    required: false
    annotations:
      sql_column: CR6840_PERSON_SEXUAL_ORIENTATION_CODE_AT_DIAGNOSIS
      sql_type: "VARCHAR(1)"

  cr0110_general_medical_practitioner_specified:
    description: >-
      GENERAL MEDICAL PRACTITIONER (SPECIFIED) is the GENERAL MEDICAL PRACTITIONER PPD CODE of the GENERAL MEDICAL PRACTITIONER specified by the PATIENT.
      
      This GENERAL MEDICAL PRACTITIONER works within the General Medical Practitioner Practice with which the PATIENT is registered.
    range: string
    required: false
    annotations:
      sql_column: CR0110_GENERAL_MEDICAL_PRACTITIONER_SPECIFIED
      sql_type: "VARCHAR(8)"

  cr0120_general_medical_practice_code_patient_registration:
    description: "The GENERAL MEDICAL PRACTICE (PATIENT REGISTRATION) is an ORGANISATION CODE. This is the code of the GP Practice that the PATIENT is registered with."
    range: string
    required: false
    annotations:
      sql_column: CR0120_GENERAL_MEDICAL_PRACTICE_CODE_PATIENT_REGISTRATION
      sql_type: "VARCHAR(8)"

  cr0150_ethnic_category:
    description: >-
      The ethnicity of a PERSON, as specified by the PERSON. The 16+1 ethnic data categories defined in the 2001 census is the national mandatory standard for the collection and analysis of ethnicity.
      
      (The Office for National Statistics has developed a further breakdown of the group from that given, which may be used locally.)
    range: EthnicCategory
    required: false
    annotations:
      sql_column: CR0150_ETHNIC_CATEGORY
      sql_type: "VARCHAR(2)"

  cr9060_ethnic_category_2021:
    description: >-
      The ethnicity of a PERSON, as specified by the PERSON.
      
      ETHNIC CATEGORY 2021 is the classification used for the 2021 census.
      
      Note: This item has not been approved by the Data Alliance Partnership Board. It has been introduced to provide advance notice to data providers and system suppliers of the intention to report this item at a later date. This item should not be submitted until further development by NHS England has been undertaken.
    range: string
    required: false
    annotations:
      sql_column: CR9060_ETHNIC_CATEGORY_2021
      sql_type: "VARCHAR(2)"

  # ---------------------------------------------------------------------------
  # Primary pathway — referral and first seen
  # ---------------------------------------------------------------------------

  pp_cr1600_source_of_referral_op:
    description: >-
      This identifies the source of referral of each Consultant Out-Patient Episode.
      
      (See User Guide for further details)
    range: SourceOfReferralForOutPatients
    required: false
    annotations:
      sql_column: PP_CR1600_SOURCE_OF_REFERRAL_OP
      sql_type: "VARCHAR(2)"

  pp_cr0230_date_first_seen:
    description: "This is the date that the PATIENT is first seen in the Trust that receives the first referral."
    range: date
    required: false
    annotations:
      sql_column: PP_CR0230_DATE_FIRST_SEEN
      sql_type: "DATE"

  pp_cr7300_prof_reg_issuer_code_cons_first_seen:
    description: "A code which identifies the PROFESSIONAL REGISTRATION BODY for the Consultant or health care professional who first sees the patient following the initial referral which leads to the cancer diagnosis."
    range: ProfessionalRegistrationIssuerCodeConsultantFirstSeen
    required: false
    annotations:
      sql_column: PP_CR7300_PROF_REG_ISSUER_CODE_CONS_FIRST_SEEN
      sql_type: "VARCHAR(2)"

  pp_cr7310_prof_reg_entry_id_cons_first_seen:
    description: "The registration identifier allocated by a Professional Registration Body for the Consultant or health care professional who first sees the patient following the initial referral which leads to the cancer diagnosis."
    range: string
    required: false
    annotations:
      sql_column: PP_CR7310_PROF_REG_ENTRY_ID_CONS_FIRST_SEEN
      sql_type: "VARCHAR(32)"

  pp_cr1410_org_site_prov_first_seen:
    description: "The ORGANISATION IDENTIFIER of the Organisation Site of the Health Care Provider at the first contact with the PATIENT."
    range: string
    required: false
    annotations:
      sql_column: PP_CR1410_ORG_SITE_PROV_FIRST_SEEN
      sql_type: "VARCHAR(9)"

  pp_cr1360_date_first_seen_cancer_specialist:
    description: "This is the date that the PATIENT is first seen by the appropriate specialist for cancer care within a Cancer Care Spell. This is the PERSON or PERSONS who are most able to progress the diagnosis of the primary tumour."
    range: date
    required: false
    annotations:
      sql_column: PP_CR1360_DATE_FIRST_SEEN_CANCER_SPECIALIST
      sql_type: "DATE"

  pp_cr1400_org_site_id_prov_first_cancer_specialist:
    description: "The ORGANISATION IDENTIFIER of the Organisation Site where the PATIENT is first seen by an appropriate cancer specialist on the DATE FIRST SEEN (CANCER SPECIALIST)."
    range: string
    required: false
    annotations:
      sql_column: PP_CR1400_ORG_SITE_ID_PROV_FIRST_CANCER_SPECIALIST
      sql_type: "VARCHAR(9)"

  # ---------------------------------------------------------------------------
  # Non-primary pathway — referral and first seen
  # ---------------------------------------------------------------------------

  npp_cr0300_source_of_referral:
    description: >-
      (Non Primary Cancer Pathway only.)
      This identifies the source of referral for a non primary cancer pathway.
    range: SourceOfReferralForNonPrimaryCancerPathway
    required: false
    annotations:
      sql_column: NPP_CR0300_SOURCE_OF_REFERRAL
      sql_type: "VARCHAR(2)"

  npp_cr7400_date_first_seen:
    description: "This is the date that the PATIENT is first seen in the Trust that receives the first referral."
    range: date
    required: false
    annotations:
      sql_column: NPP_CR7400_DATE_FIRST_SEEN
      sql_type: "DATE"

  npp_cr7410_org_site_id_prov_first_seen:
    description: "The ORGANISATION IDENTIFIER of the Organisation Site of the Health Care Provider at the first contact with the PATIENT, where the patient is on a non primary cancer pathway."
    range: string
    required: false
    annotations:
      sql_column: NPP_CR7410_ORG_SITE_ID_PROV_FIRST_SEEN
      sql_type: "VARCHAR(9)"

  # ---------------------------------------------------------------------------
  # Diagnostic procedures (1–3)
  # ---------------------------------------------------------------------------

  cr7500_diag_proc1_org_site_id:
    description: "This is the ORGANISATION IDENTIFIER of the Organisation site where the diagnostic procedure took place."
    range: string
    required: false
    annotations:
      sql_column: CR7500_DIAG_PROC1_ORG_SITE_ID
      sql_type: "VARCHAR(9)"

  cr7510_diag_proc1_procedure_date:
    description: "The DATE the diagnostic procedure was carried out."
    range: date
    required: false
    annotations:
      sql_column: CR7510_DIAG_PROC1_PROCEDURE_DATE

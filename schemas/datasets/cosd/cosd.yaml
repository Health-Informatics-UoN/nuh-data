    description: "T CATEGORY (FINAL PRETREATMENT) is the code which classifies the size and extent of the primary tumour before treatment."
    range: string
    required: false
    annotations:
      sql_column: PP_CR0520_T_CATEGORY_FINAL_PRETREATMENT
      sql_type: "VARCHAR(15)"


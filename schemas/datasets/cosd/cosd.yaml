enums:
  AdjunctiveTherapy:
    description: >-
      Adjunctive therapy is therapy given in addition to the main therapy to maximize its effectiveness.
      
      This field allows for the accurate recording of these to determine if Adjunctive therapy was Adjuvant (After the main therapy) or Neo-Adjuvant (Before the main therapy) or not applicable.
    permissible_values:
      "1":
        description: "Adjuvant"
      "2":
        description: "Neoadjuvant"
      "3":
        description: "Not Applicable (Primary Treatment)"
      "9":
        description: "Not Known"

  AnatomicalSideImaging:
    description: "The side of the body that is the subject of an Imaging or Radiodiagnostic Event."
    permissible_values:
      L:
        description: "Left"
      R:
        description: "Right"
      M:
        description: "Midline"
      B:
        description: "Bilateral"
      "8":
        description: "Not applicable"
      "9":
        description: "Not Known"

  AsaScore:
    description: "The ASA physical status classification system is a system for assessing the fitness of patients before surgery."
    permissible_values:
      "1":
        description: "A normal healthy patient."
      "2":
        description: "A patient with mild systemic disease."
      "3":
        description: "A patient with severe systemic disease."
      "4":
        description: "A patient with severe systemic disease that is a constant threat to life."
      "5":
        description: "A moribund patient who is not expected to survive without the operation."
      "6":
        description: "A declared brain-dead patient whose organs are being removed for donor purposes."

  AssessmentCarePlanPointOfPathway:
    description: "The point of the pathway where a Holistic Needs Assessment or Personalised Care and Support Plan is offered, declined, completed, not required, or unable to be completed"
    permissible_values:

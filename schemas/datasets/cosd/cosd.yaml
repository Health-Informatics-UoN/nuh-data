    description: >-
      Additional comments on diagnosis where coding is difficult or imprecise.
      (Examples of this would be:
      "papillary glioneuronal tumour" or "angiocentric glioma" to specify recently described diagnoses which do not have ICD10 or ICD-O-3 coding.
      "anaplastic ependymoma"
      or
      "ependymoblastoma" to distinguish between these two diagnoses which may have different treatment decisions or outcomes but which cannot be distinguished in ICD10 or ICD-O-3 coding.)

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --group dev --no-progress

      - name: Lint schemas
        run: uv run linkml lint --ignore-warnings schemas/

      - name: Check generated code in sync
        run: uv run python check_sync.py
        working-directory: scripts
